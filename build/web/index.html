<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="doctor_patient_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>doctor_patient_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Identity Services + Picker API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // ── Token client (GIS implicit / token model) ──────────────────────
    var _mediTokenClient = null;
    var _mediTokenCallback = null;

    window.mediInitGoogleSignIn = function(clientId, scope) {
      _mediTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: scope,
        callback: function(response) {
          if (_mediTokenCallback) {
            var cb = _mediTokenCallback;
            _mediTokenCallback = null;
            cb(response.access_token || '', response.error || '');
          }
        }
      });
    };

    window.mediRequestGoogleToken = function(callback) {
      _mediTokenCallback = callback;
      // prompt:'' means silent if already consented; shows UI only first time
      _mediTokenClient.requestAccessToken({ prompt: '' });
    };

    // ── Google Drive Picker ────────────────────────────────────────────
    window.mediShowDrivePicker = function(accessToken, apiKey, callback) {
      gapi.load('picker', function() {
        var xlsxMime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
        var view = new google.picker.DocsView()
          .setIncludeFolders(false)
          .setMimeTypes(xlsxMime);
        var picker = new google.picker.PickerBuilder()
          .addView(view)
          .setOAuthToken(accessToken)
          .setDeveloperKey(apiKey)
          .setCallback(function(data) {
            if (data.action === google.picker.Action.PICKED) {
              var f = data.docs[0];
              callback(f.id, f.name, '');
            } else if (data.action === google.picker.Action.CANCEL) {
              callback('', '', 'cancelled');
            }
          })
          .build();
        picker.setVisible(true);
      });
    };
  </script>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
